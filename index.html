<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Malotes</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxKkS2aLP0xJkKsT3Wp6bPzwJQZjj_8lM",
            authDomain: "controle-financeiro-a18de.firebaseapp.com",
            projectId: "controle-financeiro-a18de",
            storageBucket: "controle-financeiro-a18de.firebasestorage.app",
            messagingSenderId: "963247049876",
            appId: "1:963247049876:web:be8c9355342ea3a0fbb881"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            const usuario = document.getElementById("usuario").value;
            const senha = document.getElementById("senha").value;

            auth.signInWithEmailAndPassword(usuario, senha)
                .then((userCredential) => {
                    const user = userCredential.user;
                    console.log("Usuário logado com sucesso!");
                    document.getElementById("login-container").style.display = "none";
                    document.getElementById("relatorio-container").style.display = "block";
                })
                .catch((error) => {
                    console.error("Erro ao logar:", error);
                });
        }

        function registrar() {
            const usuario = document.getElementById("usuario").value;
            const senha = document.getElementById("senha").value;

            auth.createUserWithEmailAndPassword(usuario, senha)
                .then((userCredential) => {
                    const user = userCredential.user;
                    console.log("Usuário criado com sucesso!");
                    // Redirecionar para a página principal
                })
                .catch((error) => {
                    console.error("Erro ao criar usuário:", error);
                });
        }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .container {
            width: 800px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #relatorio-container {
            display: none;
        }
    </style>
</head>
<body>
    <div id="login-container" class="container">
        <div class="title">Controle de Malotes</div>
        <form>
            <div class="form-group">
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="Digite sua senha">
            </div>
            <button onclick="login()">Entrar</button>
            <button onclick="registrar()">Registrar</button>
        </form>
    </div>
    <div id="relatorio-container" class="container">
        <div class="title">Relatório de Malotes</div>
        <!-- Aqui vai ser exibido o relatório -->
    </div>
</body>
</html>
